# ---------------------------------------------------------------------------
# EduWanka — Orquestación Docker Compose
#
# Levanta el stack completo (MySQL + Laravel + SPA React) como alternativa al
# flujo local con XAMPP descrito en el README ("Inicio Rápido Local"). No
# reemplaza ese flujo: ambos pueden coexistir (XAMPP usa el puerto 3306 de
# forma nativa; este compose lo expone en 3307 para evitar choques).
#
# Uso:
#   docker compose up --build          # producción-like (Nginx sirviendo la SPA)
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up --build
#                                       # desarrollo (Vite dev server + hot reload)
#
# Servicios:
#   - db       MySQL 8 con datos persistentes en el volumen "db_data"
#   - backend  API Laravel (puerto 8000), migra/siembra automáticamente al iniciar
#   - frontend SPA React servida por Nginx con proxy a /api, /sanctum, /storage
#
# Ver: Documentacion/PLAN_DOCKERIZACION_Y_PRUEBAS_E2E_CYPRESS.md (Fase D3).
# ---------------------------------------------------------------------------

services:
  db:
    image: mysql:8.0
    container_name: eduwanka-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-eduwanka}
      MYSQL_USER: ${DB_USERNAME:-eduwanka}
      MYSQL_PASSWORD: ${DB_PASSWORD:-eduwanka}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      # Host:3307 -> Contenedor:3306, para no chocar con el MySQL de XAMPP
      # (que normalmente ocupa el 3306 del host).
      - "${DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - eduwanka-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduwanka-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: EduWanka
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-eduwanka}
      DB_USERNAME: ${DB_USERNAME:-eduwanka}
      DB_PASSWORD: ${DB_PASSWORD:-eduwanka}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local
      MAIL_MAILER: ${MAIL_MAILER:-log}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:3000,127.0.0.1:3000}
      MERCADOPAGO_PUBLIC_KEY: ${MERCADOPAGO_PUBLIC_KEY:-}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
    ports:
      - "8000:8000"
    volumes:
      # Persistir uploads/comprobantes/certificados generados entre reinicios.
      - backend_storage:/var/www/html/storage/app
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:8000/api/v1/health') ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - eduwanka-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: nginx
      args:
        VITE_API_BASE_URL: ""
        VITE_APP_BASE_DOMAIN: ${VITE_APP_BASE_DOMAIN:-}
    container_name: eduwanka-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # OJO: el mapeo de puertos del host (3000:80 en producción-like vía Nginx,
    # 3000:3000 en desarrollo vía el dev server de Vite) se define en
    # docker-compose.prod.yml / docker-compose.override.yml respectivamente,
    # NUNCA aquí — Compose concatena (no reemplaza) listas como "ports" al
    # fusionar archivos, y declarar ambos mapeos a la vez intentaría publicar
    # el puerto 3000 del host dos veces ("port is already allocated").
    networks:
      - eduwanka-net

networks:
  eduwanka-net:
    driver: bridge

volumes:
  db_data:
  backend_storage:
