# Configuracion de Nginx para servir la SPA de EduWanka (build de produccion)
# replicando el comportamiento del proxy de desarrollo de Vite
# (server.proxy en frontend/vite.config.ts): la SPA y la API comparten
# origen, por lo que apiClient (baseURL = VITE_API_BASE_URL = "") y
# Sanctum (cookies httpOnly de sesion) funcionan sin configuracion CORS
# adicional.
#
# El host "backend" se resuelve por la red interna de docker-compose
# (ver servicio "backend" en docker-compose.yml).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Proxy reverso hacia la API Laravel ---------------------------------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sanctum/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Archivos servidos por el backend (comprobantes, certificados, etc.)
    location /storage/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA: cualquier ruta desconocida cae en index.html (React Router) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Cache agresivo para assets versionados por Vite (hash en el nombre)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
